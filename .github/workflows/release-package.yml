name: Release Package

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Build with Maven
        run: mvn -B -ntp package

      - name: Resolve artifact name
        run: echo "TARGET_NAME=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.build.finalName)" >> "$GITHUB_ENV"

      - name: Upload distributable
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: target/${{ env.TARGET_NAME }}.jar

      - name: Publish to GitHub Packages (Maven)
        run: mvn -B -ntp deploy -s "$GITHUB_WORKSPACE/settings.xml"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ProxyFeatures ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: target/${{ env.TARGET_NAME }}.jar
